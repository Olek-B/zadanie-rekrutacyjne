name: Atlas Backup Workflow

on:
  workflow_dispatch:

env:
  ATLAS_CLUSTER_NAME: ${{ secrets.ATLAS_CLUSTER_NAME }}
  ATLAS_PUBLIC_KEY: ${{ secrets.ATLAS_PUBLIC_KEY }}
  ATLAS_PRIVATE_KEY: ${{ secrets.ATLAS_PRIVATE_KEY }}
  ATLAS_ORG_ID: ${{ secrets.ATLAS_ORG_ID }}
  ATLAS_PROJECT_ID: ${{ secrets.ATLAS_PROJECT_ID }}

jobs:
  create-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Atlas CLI
        uses: mongodb/atlas-github-action@v0.2.0
        with:
          atlas_public_key: ${{ env.ATLAS_PUBLIC_KEY }}
          atlas_private_key: ${{ env.ATLAS_PRIVATE_KEY }}
          atlas_org_id: ${{ env.ATLAS_ORG_ID }}
          atlas_project_id: ${{ env.ATLAS_PROJECT_ID }}

      - name: Create Atlas Snapshot
        id: create_snapshot
        shell: bash
        run: |
          set -euo pipefail
          
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          DESCRIPTION="GitHub-Backup-${TIMESTAMP}"
          
          echo "Initiating backup for cluster: ${ATLAS_CLUSTER_NAME}"
          
          # Request JSON output for reliable parsing
          RESPONSE=$(atlas backups snapshots create "${ATLAS_CLUSTER_NAME}" \
            --desc "${DESCRIPTION}" \
            --retention 7 \
            --output json)
          
          # Extract ID using jq
          SNAPSHOT_ID=$(echo "${RESPONSE}" | jq -r '.id')
          STATUS=$(echo "${RESPONSE}" | jq -r '.status')
          
          if [ -z "${SNAPSHOT_ID}" ] || [ "${SNAPSHOT_ID}" == "null" ]; then
            echo "Error: Failed to retrieve Snapshot ID from Atlas API." >&2
            echo "API Response: ${RESPONSE}" >&2
            exit 1
          fi
          
          echo "snapshot_id=${SNAPSHOT_ID}" >> $GITHUB_OUTPUT
          echo "Snapshot created successfully."

      - name: Generate Summary Report
        run: |
          SNAPSHOT_ID="${{ steps.create_snapshot.outputs.snapshot_id }}"
          
          cat >> $GITHUB_STEP_SUMMARY << EOF
          
          | Detail | Value |
          | :--- | :--- |
          | **Snapshot ID** | \`${SNAPSHOT_ID}\` |
          | **Cluster** | ${ATLAS_CLUSTER_NAME} |
          | **Created At** | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |
          | **Retention** | 7 Days |
          
          > This ID will expire after 7 days.
          EOF
          
          echo "::notice::SNAPSHOT_ID=${SNAPSHOT_ID}"
