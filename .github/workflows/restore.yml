name: Atlas Restore Workflow

on:
  workflow_dispatch:
    inputs:
      snapshot_id:
        type: string
        description: 'The Atlas Snapshot ID (copied from Backup Workflow)'
        required: true
      confirm_restore:
        type: boolean
        description: 'Check this box to confirm you want to restore the cluster'
        default: false

env:
  ATLAS_CLUSTER_NAME: ${{ secrets.ATLAS_CLUSTER_NAME }}
  ATLAS_PUBLIC_KEY: ${{ secrets.ATLAS_PUBLIC_KEY }}
  ATLAS_PRIVATE_KEY: ${{ secrets.ATLAS_PRIVATE_KEY }}
  ATLAS_ORG_ID: ${{ secrets.ATLAS_ORG_ID }}
  ATLAS_PROJECT_ID: ${{ secrets.ATLAS_PROJECT_ID }}

jobs:
  restore-cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Atlas CLI
        uses: mongodb/atlas-github-action@v0.2.0
        with:
          atlas_public_key: ${{ env.ATLAS_PUBLIC_KEY }}
          atlas_private_key: ${{ env.ATLAS_PRIVATE_KEY }}
          atlas_org_id: ${{ env.ATLAS_ORG_ID }}
          atlas_project_id: ${{ env.ATLAS_PROJECT_ID }}

      - name: Validate Snapshot ID
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          INPUT_ID="${{ inputs.snapshot_id }}"
          
          echo "Validating Snapshot ID: ${INPUT_ID}"
          
          # Fetch snapshot details
          RESPONSE=$(atlas backups snapshots get "${ATLAS_CLUSTER_NAME}" "${INPUT_ID}" --output json) || {
            echo "Error: Snapshot ID not found or API request failed." >&2
            exit 1
          }
          
          STATUS=$(echo "${RESPONSE}" | jq -r '.status')
          EXPIRED=$(echo "${RESPONSE}" | jq -r '.expired')
          
          if [ "${STATUS}" != "completed" ]; then
            echo "Error: Snapshot status is '${STATUS}'. Must be 'completed' to restore." >&2
            exit 1
          fi
          
          if [ "${EXPIRED}" == "true" ]; then
            echo "Error: Snapshot has expired." >&2
            exit 1
          fi
          
          echo "Validation successful. Status: ${STATUS}"

      - name: Confirm Restore Intent
        if: ${{ inputs.confirm_restore == false }}
        run: |
          echo "Error: Restore aborted. You must check 'confirm_restore' to proceed." >&2
          exit 1

      - name: Execute Restore
        shell: bash
        run: |
          INPUT_ID="${{ inputs.snapshot_id }}"
          
          echo "Starting restore operation for Snapshot: ${INPUT_ID}"
          echo "Target Cluster: ${ATLAS_CLUSTER_NAME}"
          
          # Initiate restore job
          # Note: This returns immediately; the restore happens asynchronously in Atlas
          atlas backups snapshots restore "${ATLAS_CLUSTER_NAME}" "${INPUT_ID}" \
            --targetClusterName "${ATLAS_CLUSTER_NAME}" \
            --targetProjectId "${ATLAS_PROJECT_ID}" \
            --output json
          
          echo "Restore job initiated successfully."

      - name: Restore Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ### 🔄 Restore Initiated
          
          | Detail | Value |
          | :--- | :--- |
          | **Snapshot ID** | \`${{ inputs.snapshot_id }}\` |
          | **Target Cluster** | ${ATLAS_CLUSTER_NAME} |
          | **Status** | In Progress |
          
          > Check the Atlas UI for the actual restore progress.
          EOF
